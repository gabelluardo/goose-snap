project: goose-snap

backends:
    garden:
        type: adhoc
        allocate: |
            if [ -n "${SPREAD_HOST_PATH-}" ]; then
                PATH="${SPREAD_HOST_PATH}"
            fi
            arch="${SPREAD_ARCH:-$(uname -m)}"
            exec image-garden allocate --spread \
               "$SPREAD_SYSTEM"."$arch"
        discard: |
            if [ -n "${SPREAD_HOST_PATH-}" ]; then
                PATH="${SPREAD_HOST_PATH}"
            fi
            image-garden discard "$SPREAD_SYSTEM_ADDRESS"
        systems:
            - ubuntu-cloud-24.04:
                  username: ubuntu
                  password: ubuntu
            - ubuntu-cloud-26.04:
                  username: ubuntu
                  password: ubuntu
            - debian-cloud-13:
                  username: debian
                  password: debian
            - fedora-cloud-43:
                  username: fedora
                  password: fedora

exclude:
    - ".git/*"

path: /root/goose-snap

prepare: |
    test_snap="$(ls ./goose_*.snap | sort -r | head -n 1)"
    test -n "$test_snap"
    snap install "$test_snap" --dangerous --classic

debug-each: |
    echo "System:"
    uname -a
    cat /etc/os-release
    snap list

suites:
    tests/smoke/:
        summary: Smoke tests for the goose snap
