name: goose
base: core24
title: Goose AI Agent
summary: An open source, extensible AI agent that automates engineering tasks
description: |
  goose is an open source, extensible AI agent that goes beyond code
  suggestions - it installs, executes, edits, and tests with any LLM.

  This snap bundles both interfaces from the same release:
    * goose     - the Electron desktop application
    * goose.cli - the goose command line interface

  Because goose runs host toolchains and arbitrary developer commands, this
  snap uses classic confinement to operate with full host access.
license: Apache-2.0
contact: https://github.com/aaif-goose/goose/issues
website: https://goose-docs.ai/
source-code: https://github.com/aaif-goose/goose
issues: https://github.com/aaif-goose/goose/issues
donation: https://github.com/sponsors/aaif-goose
adopt-info: goose-cli

grade: stable
confinement: classic

lint:
  ignore:
    - classic
    - library

platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]

apps:
  cli:
    command: bin/goose
    completer: usr/share/bash-completion/completions/goose.cli
  goose:
    command: bin/desktop-launch
    desktop: usr/share/applications/goose.desktop
    plugs:
      - desktop

parts:
  launcher:
    plugin: nil
    source: snap/local
    override-build: |
      install -Dm755 "$CRAFT_PART_SRC/desktop-launch" \
        "$CRAFT_PART_INSTALL/bin/desktop-launch"

  goose-cli:
    plugin: rust
    source: https://github.com/aaif-goose/goose
    source-type: git
    source-tag: &goose-release v1.43.0
    rust-channel: stable
    build-environment:
      - CARGO_INCREMENTAL: "0"
      - CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    override-build: |
      version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
      if [ -z "$version" ]; then
        echo "could not determine workspace version from Cargo.toml" >&2
        exit 1
      fi
      craftctl set version="$version"
      source ./bin/activate-hermit
      mkdir -p "$CRAFT_PART_INSTALL/cargo-target"
      export CARGO_TARGET_DIR="$CRAFT_PART_INSTALL/cargo-target"
      cargo build --locked --release -p goose-cli --bin goose
      install -Dm755 "$CARGO_TARGET_DIR/release/goose" "$CRAFT_PART_INSTALL/bin/goose"
      rm -rf "$CARGO_TARGET_DIR"
    build-packages:
      - build-essential
      - pkg-config
      - libssl-dev
      - libdbus-1-dev
      - libxcb1-dev
      - libxcb-util-dev
      - protobuf-compiler
      - cmake
      - clang
      - libclang-dev
      - git

  goose-desktop:
    after: [goose-cli]
    plugin: nil
    source: https://github.com/aaif-goose/goose
    source-type: git
    source-tag: *goose-release
    build-packages:
      - python3
      - make
      - g++
      - pkg-config
      - libglib2.0-bin
    override-build: |
      source ./bin/activate-hermit
      mkdir -p ui/desktop/src/bin
      install -Dm755 "$CRAFT_STAGE/bin/goose" ui/desktop/src/bin/goose
      cd ui/desktop
      pnpm install --frozen-lockfile
      pnpm run package
      app_dir="$(find out -maxdepth 1 -type d -iname '*-linux-x64' | head -n1)"
      if [ -z "$app_dir" ]; then
        echo "could not locate packaged Electron output under ui/desktop/out" >&2
        exit 1
      fi
      mkdir -p "$CRAFT_PART_INSTALL/opt/goose-desktop"
      cp -a "$app_dir/." "$CRAFT_PART_INSTALL/opt/goose-desktop/"
      dest="$CRAFT_PART_INSTALL/opt/goose-desktop"
      chmod -R a+rX "$dest"
      chmod +x "$dest/Goose"
      [ -f "$dest/chrome-sandbox" ] && chmod 755 "$dest/chrome-sandbox" || true
      [ -f "$dest/chrome_crashpad_handler" ] && chmod +x "$dest/chrome_crashpad_handler" || true
      if [ -f "$dest/resources/bin/goose" ]; then
        rm "$dest/resources/bin/goose"
        ln -s ../../../../bin/goose "$dest/resources/bin/goose"
      fi

      install -Dm644 src/images/icon.png "$CRAFT_PART_INSTALL/meta/gui/icon.png"
      install -dm755 "$CRAFT_PART_INSTALL/usr/share/icons/hicolor/128x128/apps"
      install -Dm644 src/images/icon.png "$CRAFT_PART_INSTALL/usr/share/icons/hicolor/128x128/apps/goose.png"
    stage-packages:
      - gsettings-desktop-schemas
    override-prime: |
      craftctl default
      schema_dir="$CRAFT_PRIME/usr/share/glib-2.0/schemas"
      if [ -d "$schema_dir" ]; then
        glib-compile-schemas "$schema_dir"
      fi
  goose-configuration:
    after:
      - goose-cli
      - goose-desktop
    plugin: nil
    source: snap/local
    override-build: |
      install -dm755 "$CRAFT_PART_INSTALL"/usr/share/bash-completion/completions
      "$CRAFT_STAGE"/bin/goose completion bash --bin-name goose.cli \
        > "$CRAFT_PART_INSTALL"/usr/share/bash-completion/completions/goose.cli
      install -dm755 "$CRAFT_PART_INSTALL"/usr/share/fish/vendor_completions.d
      "$CRAFT_STAGE"/bin/goose completion fish --bin-name goose.cli \
        > "$CRAFT_PART_INSTALL"/usr/share/fish/vendor_completions.d/goose.cli.fish
      install -dm755 "$CRAFT_PART_INSTALL"/usr/share/zsh/vendor-completions
      "$CRAFT_STAGE"/bin/goose completion zsh --bin-name goose.cli \
        > "$CRAFT_PART_INSTALL"/usr/share/zsh/vendor-completions/_goose.cli
      mkdir -p "$CRAFT_PART_INSTALL/usr/share/applications"
      printf '%s\n' \
        '[Desktop Entry]' \
        'Name=Goose' \
        'GenericName=Goose AI Agent' \
        'Comment=An open source, extensible AI agent that automates engineering tasks' \
        'Exec=goose %U' \
        'Icon=${SNAP}/meta/gui/icon.png' \
        'Terminal=false' \
        'Type=Application' \
        'Categories=Development;' \
        'MimeType=x-scheme-handler/goose;' \
        'StartupNotify=true' \
        'StartupWMClass=Goose' \
        > "$CRAFT_PART_INSTALL/usr/share/applications/goose.desktop"
